<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f1e8">
    <title>{% block title %}Finpulse{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="1024x1536" href="{{ asset_url('img/FinPulse-NavBar.png') }}">
    <link rel="apple-touch-icon" sizes="1024x1536" href="{{ asset_url('img/FinPulse-NavBar.png') }}">
    <link rel="icon" href="{{ asset_url('favicon.ico') }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ asset_url('css/styles.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/bootstrap-formatting.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/responsive.css') }}">
</head>
<body class="theme-dark{% block body_class %}{% endblock %}">
    <div class="signal-veins-bg" aria-hidden="true">
        <div class="signal-veins-panel">
            <div class="signal-veins-base"></div>

            <svg
                class="signal-veins-svg"
                viewBox="0 0 1200 700"
                preserveAspectRatio="none"
            >
                <path d="M0 120 C170 70, 230 185, 400 162 S730 66, 1200 156" fill="none" stroke="rgba(120,95,60,0.17)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 185 C190 132, 270 245, 448 218 S780 130, 1200 212" fill="none" stroke="rgba(120,95,60,0.16)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 252 C200 185, 290 300, 470 278 S815 188, 1200 268" fill="none" stroke="rgba(120,95,60,0.15)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 322 C168 258, 258 372, 456 346 S828 252, 1200 336" fill="none" stroke="rgba(120,95,60,0.14)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 394 C182 330, 282 442, 500 418 S852 336, 1200 420" fill="none" stroke="rgba(120,95,60,0.13)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 468 C210 402, 302 530, 552 498 S886 418, 1200 502" fill="none" stroke="rgba(120,95,60,0.13)" stroke-width="1.9" stroke-linecap="round">
                </path>
                <path d="M0 548 C232 482, 328 622, 592 576 S918 488, 1200 578" fill="none" stroke="rgba(120,95,60,0.13)" stroke-width="1.9" stroke-linecap="round">
                </path>

                <path d="M70 132 C226 96, 320 204, 505 180" fill="none" stroke="rgba(196,158,87,0.46)" stroke-width="2.4" stroke-linecap="round">
                </path>
                <path d="M164 214 C332 182, 478 222, 706 206" fill="none" stroke="rgba(196,158,87,0.46)" stroke-width="2.4" stroke-linecap="round">
                </path>
                <path d="M328 302 C502 266, 646 274, 872 302" fill="none" stroke="rgba(196,158,87,0.46)" stroke-width="2.4" stroke-linecap="round">
                </path>
                <path d="M456 410 C636 384, 776 378, 1024 414" fill="none" stroke="rgba(196,158,87,0.46)" stroke-width="2.4" stroke-linecap="round">
                </path>
                <path d="M582 512 C756 486, 910 456, 1144 510" fill="none" stroke="rgba(196,158,87,0.46)" stroke-width="2.4" stroke-linecap="round">
                </path>
            </svg>

            <div class="signal-veins-orb signal-veins-orb-a"></div>
            <div class="signal-veins-orb signal-veins-orb-b"></div>
            <div class="signal-veins-vignette"></div>
        </div>
    </div>

    <header class="site-header">
        <div class="utility-bar">
            <div class="container-fluid px-3 px-lg-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
                <div class="utility-status d-flex align-items-center gap-2">
                    <span class="status-indicator {{ market_status.indicator_class | default('is-open') }}" aria-hidden="true"></span>
                    <span class="utility-label text-uppercase">US Markets</span>
                    <span class="utility-meta text-white-50">
                        {{ market_status.state_text | default('Open') }} · {{ market_status.descriptor | default('Closes 4:00 PM ET') }}
                    </span>
                </div>
                <div class="utility-links d-flex align-items-center gap-3">
                    <a class="utility-link" href="{{ url_for('web.mission') }}">Mission</a>
                    <a class="utility-link" href="{{ url_for('web.contact') }}">Contact</a>
                    <a class="utility-link" href="{{ url_for('web.home') }}">Home</a>
                </div>
            </div>
        </div>
    </header>

    <main class="site-main py-4 py-lg-5">
        <div class="container container-xl px-3 px-lg-4">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ asset_url('js/signal-veins.js') }}"></script>
    <script src="{{ asset_url('js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
